<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Core - Selector de Área</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
        body { background-color: #141414; color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; padding: 20px; }
        .selector-container { text-align: center; width: 100%; max-width: 500px; }
        h1 { font-size: 1.8rem; margin-bottom: 10px; font-weight: bold; }
        p { color: #aaa; margin-bottom: 30px; font-size: 1rem; }
        .grid-areas { display: grid; grid-template-columns: 1fr; gap: 15px; }
        .btn-area { width: 100%; padding: 20px; background: #222; border: 2px solid #444; border-radius: 8px; color: white; font-size: 1.2rem; font-weight: bold; cursor: pointer; transition: all 0.2s ease; text-transform: uppercase; }
        .btn-area:hover { background: #E50914; border-color: #E50914; transform: scale(1.02); }
        .btn-logout { margin-top: 40px; background: transparent; border: none; color: #aaa; text-decoration: underline; cursor: pointer; font-size: 0.9rem; }
        .btn-logout:hover { color: #fff; }
    </style>
</head>
<body>

<div class="selector-container" id="moduloSelector" style="display: none;">
    <h1>¿Qué área operarás hoy?</h1>
    <p>Detectamos que tienes más de un área asignada para este turno.</p>
    
    <div class="grid-areas" id="contenedorBotones">
        <!-- Los botones de Doble Turno se generarán aquí con código -->
    </div>

    <button class="btn-logout" onclick="cerrarSesion()">Cerrar Sesion</button>
</div>

<script>
    document.addEventListener("DOMContentLoaded", () => {
        // Recuperar los datos guardados en el Login
        const usuario = JSON.parse(localStorage.getItem("usuario_conectado"));
        const areas = JSON.parse(localStorage.getItem("areas_hoy")) || [];

        // Seguridad: Si no hay usuario logueado, patitas a la calle (al login)
        if (!usuario) {
            window.location.href = "login.html";
            return;
        }

        // CASO 1: No tiene turnos de "Trabajo" programados para hoy en el Sheet
        if (areas.length === 0) {
            alert("Hola " + usuario.nombre + ". No tienes un turno de trabajo programado para hoy o es tu día de Descanso.");
            cerrarSesion();
            return;
        }

        // CASO 2: Tiene exactamente 1 área asignada (Va directo sin preguntar)
        if (areas.length === 1) {
            redirigirArea(areas[0]);
            return;
        }

        // CASO 3: DOBLE TURNO (Tiene 2 o más áreas el mismo día)
        // Mostramos la interfaz oculta estilo Netflix para que elija
        document.getElementById("moduloSelector").style.display = "block";
        const contenedor = document.getElementById("contenedorBotones");

        areas.forEach(area => {
            const boton = document.createElement("button");
            boton.className = "btn-area";
            boton.innerText = area;
            boton.onclick = () => redirigirArea(area);
            contenedor.appendChild(boton);
        });
    });

    // Función que decide a qué archivo HTML mandar al usuario
    function redirigirArea(area) {
        const nombreLimpio = area.trim().toLowerCase();
        
        if (nombreLimpio === "tienda") {
            window.location.href = "tienda.html";
        } else if (nombreLimpio === "cocina") {
            window.location.href = "cocina.html";
        } else if (nombreLimpio === "reparto") {
            window.location.href = "reparto.html";
        } else {
            alert("Área desconocida: " + area + ". Contacta soporte.");
            cerrarSesion();
        }
    }

    function cerrarSesion() {
        localStorage.clear();
        window.location.href = "login.html";
    }
</script>

</body>
</html>
