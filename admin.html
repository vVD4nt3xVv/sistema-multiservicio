<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Core - Panel de Administración</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
        body { background-color: #141414; color: #fff; min-height: 100vh; padding: 20px; }
        
        /* Barra superior */
        header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 20px; border-bottom: 1px solid #333; margin-bottom: 30px; }
        h1 { font-size: 1.6rem; font-weight: bold; }
        .user-info { color: #aaa; font-size: 0.9rem; }
        .btn-logout { background: #E50914; border: none; padding: 8px 16px; color: white; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 0.85rem; }
        .btn-logout:hover { background: #BF0810; }

        /* Tarjetas de Resumen */
        .grid-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 15px; margin-bottom: 30px; }
        .card-stat { background: #1f1f1f; padding: 20px; border-radius: 8px; border: 1px solid #333; text-align: center; }
        .card-stat h3 { font-size: 0.85rem; color: #aaa; text-transform: uppercase; margin-bottom: 10px; }
        .card-stat p { font-size: 1.8rem; font-weight: bold; color: #E50914; }

        /* Menú de Operaciones */
        .menu-title { font-size: 1.2rem; margin-bottom: 15px; color: #fff; font-weight: bold; }
        .grid-menu { display: grid; grid-template-columns: 1fr; gap: 15px; }
        .btn-menu { background: #222; border: 1px solid #444; padding: 20px; border-radius: 8px; color: white; text-align: left; font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: all 0.2s ease; display: flex; justify-content: space-between; align-items: center; }
        .btn-menu:hover { border-color: #E50914; background: #2a2a2a; transform: translateY(-2px); }
        .btn-menu span.arrow { color: #E50914; font-size: 1.3rem; }
    </style>
</head>
<body>

    <header>
        <div>
            <h1>Panel Administrativo</h1>
            <div class="user-info" id="lblAdminNombre">Cargando administrador...</div>
        </div>
        <button class="btn-logout" onclick="cerrarSesion()">Salir</button>
    </header>

    <!-- Resumen rápido del negocio -->
    <div class="grid-stats">
        <div class="card-stat">
            <h3>Área Tienda</h3>
            <p id="statTienda">—</p>
        </div>
        <div class="card-stat">
            <h3>Área Cocina</h3>
            <p id="statCocina">—</p>
        </div>
        <div class="card-stat">
            <h3>Área Reparto</h3>
            <p id="statReparto">—</p>
        </div>
    </div>

    <!-- Módulos de gestión mas adelante -->
    <div class="menu-title">Gestión del Sistema</div>
    <div class="grid-menu">
        <button class="btn-menu" onclick="alert('Próximamente: Control de Usuarios')">
            👥 Control de Personal y Usuarios <span class="arrow">➔</span>
        </button>
        <button class="btn-menu" onclick="alert('Próximamente: Programación de Turnos')">
            📅 Asignación de Turnos Semanales <span class="arrow">➔</span>
        </button>
        <button class="btn-menu" onclick="alert('Próximamente: Reportes de Ventas')">
            📊 Reportes Consolidados <span class="arrow">➔</span>
        </button>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            // Verificar que haya sesión activa
            const usuario = JSON.parse(localStorage.getItem("usuario_conectado"));
            
            if (!usuario || usuario.rolBase !== "administrador") {
                // Si no es admin, lo botamos al login por seguridad
                localStorage.clear();
                window.location.href = "login.html";
                return;
            }

            // Colocar el nombre del administrador en la pantalla
            document.getElementById("lblAdminNombre").innerText = "Administrador: " + usuario.nombre;

            // Simulación inicial de personal activo hoy (Esto luego leerá el Sheet)
            document.getElementById("statTienda").innerText = "Activo";
            document.getElementById("statCocina").innerText = "Activo";
            document.getElementById("statReparto").innerText = "Listo";
        });

        function cerrarSesion() {
            localStorage.clear();
            window.location.href = "login.html";
        }
    </script>
</body>
</html>
