<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Core - Iniciar Sesión</title>
    <!-- Estilos estilo Netflix -->
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
        body { background-color: #141414; color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .login-wrapper { background: rgba(0, 0, 0, 0.75); padding: 40px; width: 100%; max-width: 400px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        h1 { font-size: 2rem; margin-bottom: 25px; font-weight: bold; }
        .input-group { position: relative; margin-bottom: 20px; }
        input { width: 100%; padding: 14px 10px; background: #333; border: none; border-radius: 4px; color: white; font-size: 1rem; outline: none; transition: background 0.2s; }
        input:focus { background: #454545; }
        .btn-login { width: 100%; padding: 14px; background: #E50914; border: none; border-radius: 4px; color: white; font-size: 1rem; font-weight: bold; cursor: pointer; margin-top: 15px; transition: background 0.2s; }
        .btn-login:hover { background: #BF0810; }
        .error-msg { color: #E87C03; font-size: 0.85rem; margin-top: 5px; display: none; }
        .input-error { border-bottom: 2px solid #E87C03; }
    </style>
</head>
<body>

<div class="login-wrapper">
    <h1>Iniciar Sesión</h1>
    
    <div class="input-group">
        <input type="text" id="txtUsuario" placeholder="Usuario">
        <div id="errUsuario" class="error-msg"></div>
    </div>

    <div class="input-group">
        <input type="password" id="txtContrasena" placeholder="Contraseña">
        <div id="errContrasena" class="error-msg"></div>
    </div>

    <button class="btn-login" id="btnIngresar">Iniciar Sesión</button>
</div>

<!-- Scripts de conexión -->
<script src="conn.js"></script>
<script>
    document.getElementById("btnIngresar").addEventListener("click", async () => {
        const user = document.getElementById("txtUsuario").value.trim();
        const pass = document.getElementById("txtContrasena").value.trim();
        
        const errUser = document.getElementById("errUsuario");
        const errPass = document.getElementById("errContrasena");
        const inputUser = document.getElementById("txtUsuario");
        const inputPass = document.getElementById("txtContrasena");

        // Limpiar errores previos
        errUser.style.display = "none";
        errPass.style.display = "none";
        inputUser.classList.remove("input-error");
        inputPass.classList.remove("input-error");

        // Validación básica antes de enviar
        if(!user) {
            errUser.innerText = "Por favor, introduce un usuario válido.";
            errUser.style.display = "block";
            inputUser.classList.add("input-error");
            return;
        }
        if(!pass) {
            errPass.innerText = "La contraseña debe tener entre 4 y 60 caracteres.";
            errPass.style.display = "block";
            inputPass.classList.add("input-error");
            return;
        }

        // Cambiar texto de botón mientras carga
        document.getElementById("btnIngresar").innerText = "Cargando...";

        // Enviar datos al Apps Script mediante la función global de conn.js
        const respuesta = await enviarPeticion({
            accion: "login",
            usuario: user,
            contrasena: pass
        });

        document.getElementById("btnIngresar").innerText = "Iniciar Sesión";

        if(respuesta.exito) {
            // Guardamos los datos temporalmente en el celular
            localStorage.setItem("usuario_conectado", JSON.stringify(respuesta.usuario));
            localStorage.setItem("areas_hoy", JSON.stringify(respuesta.areas));
            
            // Redirección inteligente según el rol
            if(respuesta.usuario.rolBase === "administrador") {
                window.location.href = "admin.html"; 
            } else {
                window.location.href = "dashboard.html"; 
            }
        } else {
            // Manejo de errores específicos estilo Netflix
            if(respuesta.tipoError === "usuario") {
                errUser.innerText = respuesta.mensaje;
                errUser.style.display = "block";
                inputUser.classList.add("input-error");
            } else if(respuesta.tipoError === "contrasena" || respuesta.tipoError === "inactivo") {
                errPass.innerText = respuesta.mensaje;
                errPass.style.display = "block";
                inputPass.classList.add("input-error");
            } else {
                alert(respuesta.mensaje);
            }
        }
    });
</script>

</body>
</html>
